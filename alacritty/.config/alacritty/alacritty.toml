# Colors (Everforest Dark Hard)

[colors.primary]
background = '#272e33'
foreground = '#d3c6aa'

[colors.normal]
black   = '#414b50'
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'

[colors.bright]
black   = '#414b50'
red     = '#e67e80'
green   = '#a7c080'
yellow  = '#dbbc7f'
blue    = '#7fbbb3'
magenta = '#d699b6'
cyan    = '#83c092'
white   = '#d3c6aa'

[colors.selection]
background = '#4c3743'
text       = '#d3c6aa'

[colors.search.matches]
background = '#a7c080'
foreground = '#272e33'

[colors.search.focused_match]
background = '#e67e80'
foreground = '#272e33'

[window]
decorations = "None"
startup_mode = "Maximized"
option_as_alt = "Both"
padding = { x = 0, y = 0 }

[font]
normal = { family = "Hack Nerd Font", style = "Regular" }
bold = { family = "Hack Nerd Font", style = "Regular" }
size = 20

[terminal]
shell = { program = "/opt/homebrew/bin/fish" }

